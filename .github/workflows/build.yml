name: Build

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone JUCE
      run: git clone --depth 1 --branch 7.0.9 https://github.com/juce-framework/JUCE.git JUCE

    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SANA_8bit_VST-Windows-x64
        path: |
          build/SANA_8bit_VST_artefacts/Release/VST3/*.vst3
          build/SANA_8bit_VST_artefacts/Release/Standalone/*.exe

  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone JUCE
      run: git clone --depth 1 --branch 7.0.9 https://github.com/juce-framework/JUCE.git JUCE

    - name: Configure CMake (Universal Binary)
      run: cmake -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

    - name: Build
      run: cmake --build build --config Release

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SANA_8bit_VST-macOS-Universal
        path: |
          build/SANA_8bit_VST_artefacts/Release/VST3/*.vst3
          build/SANA_8bit_VST_artefacts/Release/AU/*.component
          build/SANA_8bit_VST_artefacts/Release/Standalone/*.app

  build-macos-signed:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone JUCE
      run: git clone --depth 1 --branch 7.0.9 https://github.com/juce-framework/JUCE.git JUCE

    - name: Install Apple certificate
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      run: |
        # Create temporary keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

        # Decode certificate
        echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

        # Create and configure keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # Import certificate
        security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # Allow codesign to access the keychain
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

    - name: Configure CMake (Universal Binary)
      run: cmake -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

    - name: Build
      run: cmake --build build --config Release

    - name: Sign plugins
      env:
        MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      run: |
        # Sign VST3
        codesign --force --deep --sign "$MACOS_SIGNING_IDENTITY" \
          "build/SANA_8bit_VST_artefacts/Release/VST3/SANA 8bit VST.vst3"

        # Sign AU
        codesign --force --deep --sign "$MACOS_SIGNING_IDENTITY" \
          "build/SANA_8bit_VST_artefacts/Release/AU/SANA 8bit VST.component"

        # Sign Standalone
        codesign --force --deep --sign "$MACOS_SIGNING_IDENTITY" \
          "build/SANA_8bit_VST_artefacts/Release/Standalone/SANA 8bit VST.app"

    - name: Notarize plugins
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        # Create zip for notarization
        cd build/SANA_8bit_VST_artefacts/Release

        # Zip VST3
        ditto -c -k --keepParent "VST3/SANA 8bit VST.vst3" SANA_8bit_VST_VST3.zip

        # Zip AU
        ditto -c -k --keepParent "AU/SANA 8bit VST.component" SANA_8bit_VST_AU.zip

        # Zip Standalone
        ditto -c -k --keepParent "Standalone/SANA 8bit VST.app" SANA_8bit_VST_Standalone.zip

        # Submit for notarization
        xcrun notarytool submit SANA_8bit_VST_VST3.zip \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_ID_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait

        xcrun notarytool submit SANA_8bit_VST_AU.zip \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_ID_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait

        xcrun notarytool submit SANA_8bit_VST_Standalone.zip \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_ID_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait

        # Staple the notarization ticket
        xcrun stapler staple "VST3/SANA 8bit VST.vst3"
        xcrun stapler staple "AU/SANA 8bit VST.component"
        xcrun stapler staple "Standalone/SANA 8bit VST.app"

    - name: Upload signed macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SANA_8bit_VST-macOS-Universal-Signed
        path: |
          build/SANA_8bit_VST_artefacts/Release/VST3/*.vst3
          build/SANA_8bit_VST_artefacts/Release/AU/*.component
          build/SANA_8bit_VST_artefacts/Release/Standalone/*.app

  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos-signed]
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create release archives
      run: |
        cd artifacts

        # Windows
        zip -r ../SANA_8bit_VST-Windows-x64.zip SANA_8bit_VST-Windows-x64/

        # macOS signed
        zip -r ../SANA_8bit_VST-macOS-Universal.zip SANA_8bit_VST-macOS-Universal-Signed/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          SANA_8bit_VST-Windows-x64.zip
          SANA_8bit_VST-macOS-Universal.zip
        generate_release_notes: true
