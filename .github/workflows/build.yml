name: Build Test

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS'
        required: false
        default: true
        type: boolean

jobs:
  build-windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone JUCE
      run: git clone --depth 1 --branch 7.0.9 https://github.com/juce-framework/JUCE.git JUCE

    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SANA_8bit_VST-Windows-x64
        path: |
          build/SANA_8bit_VST_artefacts/Release/VST3/*.vst3
          build/SANA_8bit_VST_artefacts/Release/Standalone/*.exe

  build-macos:
    if: ${{ inputs.build_macos }}
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone JUCE
      run: git clone --depth 1 --branch 7.0.9 https://github.com/juce-framework/JUCE.git JUCE

    - name: Configure CMake (Universal Binary)
      run: cmake -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

    - name: Build
      run: cmake --build build --config Release

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SANA_8bit_VST-macOS-Universal
        path: |
          build/SANA_8bit_VST_artefacts/Release/VST3/*.vst3
          build/SANA_8bit_VST_artefacts/Release/AU/*.component
          build/SANA_8bit_VST_artefacts/Release/Standalone/*.app
